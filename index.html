<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disk Scheduling Visualizer | Modern OS Tools</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .visualizer-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 900px) {
            .visualizer-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #4338ca 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .chart-container {
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #result-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            display: block;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.1);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            text-align: left;
            padding: 16px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        td {
            padding: 16px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.95rem;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--primary);
            color: white;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body>

    <div class="container animate-in">
        <header>
            <h1>Disk Visualizer</h1>
            <p class="subtitle">Advanced OS Scheduling Algorithms Visualization</p>
        </header>

        <div class="visualizer-grid">
            <aside class="card">
                <div class="input-group">
                    <label for="requests">Request Queue</label>
                    <input type="text" id="requests" placeholder="e.g. 98, 183, 37, 122, 14" value="98, 183, 37, 122, 14, 124, 65, 67">
                </div>

                <div class="input-group">
                    <label for="head">Initial Head Position</label>
                    <input type="number" id="head" placeholder="53" value="53">
                </div>

                <div class="input-group">
                    <label for="algo">Algorithm</label>
                    <select id="algo">
                        <option value="fcfs">FCFS (First-Come, First-Served)</option>
                        <option value="sstf">SSTF (Shortest Seek Time First)</option>
                        <option value="scan">SCAN (Elevator)</option>
                        <option value="cscan">C-SCAN (Circular SCAN)</option>
                    </select>
                </div>

                <button onclick="run()">Visualize Path</button>
            </aside>

            <main class="card chart-container">
                <canvas id="chart"></canvas>
            </main>
        </div>

        <div id="results-section" style="display: none;">
            <div id="result-summary">
                <div class="stat-card">
                    <span class="stat-label">Total Seek Time</span>
                    <span id="stat-total-seek" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Requests Processed</span>
                    <span id="stat-req-count" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Active Algorithm</span>
                    <span id="stat-algo-name" class="stat-value">-</span>
                </div>
            </div>

            <div class="card">
                <div class="table-wrapper">
                    <table id="result-table">
                        <thead>
                            <tr>
                                <th>STEP</th>
                                <th>HEAD POSITION</th>
                                <th>SEEK DISTANCE</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Rows added dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chart;

        function run() {
            const reqInput = document.getElementById("requests").value;
            const head = parseInt(document.getElementById("head").value);
            const algo = document.getElementById("algo").value;

            if (!reqInput || isNaN(head)) {
                alert("Please provide a valid request queue and head position.");
                return;
            }

            const requests = reqInput.split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            let sequence = [];
            let diskSize = 200;

            // Logic remains consistent with the original tool for accuracy
            if (algo === "fcfs") {
                sequence = [head, ...requests];
            } else if (algo === "sstf") {
                let temp = [...requests];
                let current = head;
                sequence.push(current);
                while (temp.length > 0) {
                    let closest = temp.reduce((prev, curr) =>
                        Math.abs(curr - current) < Math.abs(prev - current) ? curr : prev
                    );
                    current = closest;
                    sequence.push(current);
                    temp.splice(temp.indexOf(closest), 1);
                }
            } else if (algo === "scan") {
                let left = requests.filter(r => r < head).sort((a, b) => b - a);
                let right = requests.filter(r => r >= head).sort((a, b) => a - b);
                sequence = [head, ...right, diskSize - 1, ...left];
            } else if (algo === "cscan") {
                let left = requests.filter(r => r < head).sort((a, b) => a - b);
                let right = requests.filter(r => r >= head).sort((a, b) => a - b);
                sequence = [head, ...right, diskSize - 1, 0, ...left];
            }

            // Calculations
            let totalSeek = 0;
            for (let i = 1; i < sequence.length; i++) {
                totalSeek += Math.abs(sequence[i] - sequence[i - 1]);
            }

            updateUI(sequence, totalSeek, algo);
            drawGraph(sequence);
        }

        function updateUI(sequence, totalSeek, algo) {
            document.getElementById("results-section").style.display = "block";
            document.getElementById("stat-total-seek").innerText = totalSeek;
            document.getElementById("stat-req-count").innerText = sequence.length - 1;
            document.getElementById("stat-algo-name").innerText = algo.toUpperCase();

            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";

            sequence.forEach((pos, i) => {
                const distance = i === 0 ? "-" : Math.abs(pos - sequence[i - 1]);
                const row = `
                    <tr>
                        <td><span class="badge">#${i}</span></td>
                        <td>${pos}</td>
                        <td>${distance}</td>
                        <td><span style="color: ${i === 0 ? '#94a3b8' : '#10b981'}">${i === 0 ? 'Initial' : 'Processed'}</span></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            // Scroll to results
            document.getElementById("results-section").scrollIntoView({ behavior: 'smooth' });
        }

        function drawGraph(sequence) {
            if (chart) chart.destroy();

            const ctx = document.getElementById("chart").getContext("2d");
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(99, 102, 241, 0.5)');
            gradient.addColorStop(1, 'rgba(99, 102, 241, 0)');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sequence.map((_, i) => i),
                    datasets: [{
                        label: "Head Position",
                        data: sequence,
                        borderColor: '#6366f1',
                        borderWidth: 3,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#6366f1',
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { family: 'Inter', size: 14 },
                            bodyFont: { family: 'Inter', size: 13 },
                            padding: 12,
                            cornerRadius: 8,
                            displayColors: false
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#94a3b8', font: { family: 'Inter' } },
                            title: { display: true, text: 'Step Number', color: '#94a3b8' }
                        },
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#94a3b8', font: { family: 'Inter' } },
                            title: { display: true, text: 'Disk Track', color: '#94a3b8' },
                            min: 0,
                            max: 200
                        }
                    }
                }
            });
        }

        // Initialize with default values
        window.onload = run;
    </script>
</body>
</html>
